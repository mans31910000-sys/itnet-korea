<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>잇넷 | 무료 QR 연결 서비스 · 물건과 보호자 연결</title>

<meta name="description" content="잇넷은 소중한 물건부터 보호가 필요한 아동·치매노인까지 QR을 통해 발견자와 소유자 또는 보호자를 빠르게 연결하는 무료 QR 서비스입니다.">

<meta name="keywords" content="잇넷, ITNET KOREA, 분실물 QR, 무료 QR, 보호자 연결 QR, 아동 보호 QR, 치매노인 QR, 지갑 분실, 열쇠 분실, 가방 분실, QR 연락처">

<meta name="robots" content="index, follow">

<link rel="canonical" href="https://mans31910000-sys.github.io/itnet-korea/">

<meta property="og:type" content="website">
<meta property="og:title" content="잇넷 | 무료 QR 연결 서비스">
<meta property="og:description" content="소중한 물건부터 보호가 필요한 가족까지, QR로 다시 연결하세요.">
<meta property="og:url" content="https://mans31910000-sys.github.io/itnet-korea/">
<meta property="og:image" content="https://mans31910000-sys.github.io/itnet-korea/itnet-hero.png">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#ffffff;
  color:#0b2239;
  text-align:center;
}

.wrap{
  width:100%;
  max-width:980px;
  margin:0 auto;
  padding:26px 18px 45px;
}

/* 로고 */

.logo{
  margin-bottom:6px;
  font-size:34px;
  font-weight:900;
  color:#073052;
}

.logo span{
  color:#00a99d;
}

.sub{
  margin-bottom:22px;
  font-size:17px;
  color:#526474;
}

/* 메인 이미지 */

.hero-img{
  display:block;
  width:100%;
  max-height:460px;
  object-fit:cover;
  border-radius:26px;
  box-shadow:0 10px 28px rgba(0,0,0,0.11);
}

/* 핵심 문구 */

.main-title{
  margin:30px 0 12px;
  font-size:40px;
  line-height:1.35;
  font-weight:900;
  word-break:keep-all;
}

.main-title span{
  color:#00a99d;
}

.desc{
  margin:0 0 25px;
  font-size:20px;
  line-height:1.6;
  color:#405060;
  word-break:keep-all;
}

/* QR 생성 버튼 */

.qr-btn{
  display:block;
  width:100%;
  max-width:560px;
  margin:0 auto;
  padding:23px 18px;
  border-radius:21px;
  background:linear-gradient(90deg,#00b8a9,#0077d9);
  color:#ffffff;
  text-decoration:none;
  font-size:29px;
  font-weight:900;
  box-shadow:0 11px 25px rgba(0,120,160,0.25);
  transition:transform 0.15s ease;
}

.qr-btn:active{
  transform:scale(0.98);
}

/* 간편 사용 안내 */

.simple{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:8px;
  margin:18px auto 0;
  font-size:18px;
  font-weight:800;
  color:#405060;
}

.simple span{
  white-space:nowrap;
}

.simple .yes{
  color:#00897b;
}

/* 등록 수 */

.network-stats{
  max-width:760px;
  margin:28px auto 0;
  padding:20px 18px;
  border:1px solid #dceff1;
  border-radius:18px;
  background:#f4fbfc;
  font-size:21px;
  line-height:1.6;
  font-weight:800;
}

.network-stats strong{
  margin:0 4px;
  color:#e53935;
  font-size:27px;
}

/* 바로가기 */

.link-section{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  max-width:760px;
  margin:20px auto 0;
}

.small-link{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:76px;
  padding:17px 14px;
  border:1px solid #e4eef2;
  border-radius:17px;
  background:#ffffff;
  box-shadow:0 5px 16px rgba(0,0,0,0.04);
  color:#0b2239;
  text-decoration:none;
  font-size:18px;
  line-height:1.4;
  font-weight:900;
}

/* 펫넷 연결 */

.petnet-box{
  position:relative;
  max-width:760px;
  margin:22px auto 0;
  padding:30px 24px 24px;
  border:1px solid rgba(255,255,255,0.65);
  border-radius:25px;
  background:linear-gradient(135deg,#e8fbff 0%,#dff8f3 48%,#e4ecff 100%);
  box-shadow:0 14px 34px rgba(7,59,120,0.16);
  overflow:hidden;
}

.petnet-box::before{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  top:-90px;
  right:-60px;
  border-radius:50%;
  background:rgba(0,169,157,0.12);
}

.petnet-box::after{
  content:"";
  position:absolute;
  width:140px;
  height:140px;
  bottom:-80px;
  left:-50px;
  border-radius:50%;
  background:rgba(0,119,217,0.10);
}

.petnet-content{
  position:relative;
  z-index:1;
}

.dog-circle{
  display:flex;
  justify-content:center;
  align-items:center;
  width:88px;
  height:88px;
  margin:0 auto 15px;
  border:4px solid rgba(255,255,255,0.85);
  border-radius:50%;
  background:#ffffff;
  font-size:52px;
  box-shadow:0 8px 20px rgba(7,59,120,0.15);
}

.petnet-label{
  margin-bottom:8px;
  color:#00897b;
  font-size:15px;
  font-weight:900;
  letter-spacing:1.5px;
}

.petnet-title{
  margin:0;
  color:#073052;
  font-size:27px;
  line-height:1.35;
  font-weight:900;
  word-break:keep-all;
}

.petnet-desc{
  margin:11px 0 21px;
  color:#405060;
  font-size:17px;
  line-height:1.6;
  word-break:keep-all;
}

.petnet-btn{
  display:block;
  width:100%;
  padding:18px 16px;
  border-radius:16px;
  background:linear-gradient(90deg,#073b78,#005aaa);
  color:#ffffff;
  text-decoration:none;
  font-size:20px;
  font-weight:900;
  box-shadow:0 8px 19px rgba(7,59,120,0.24);
  transition:transform 0.15s ease;
}

.petnet-btn:active{
  transform:scale(0.98);
}

/* 하단 */

.footer{
  margin-top:28px;
  font-size:14px;
  color:#7a8792;
}

/* 모바일 */

@media(max-width:700px){

  .wrap{
    padding:22px 14px 38px;
  }

  .logo{
    font-size:29px;
  }

  .sub{
    margin-bottom:18px;
    font-size:16px;
  }

  .hero-img{
    border-radius:20px;
  }

  .main-title{
    margin-top:25px;
    font-size:31px;
  }

  .desc{
    font-size:18px;
  }

  .qr-btn{
    padding:21px 15px;
    font-size:25px;
  }

  .simple{
    font-size:16px;
  }

  .network-stats{
    padding:18px 12px;
    font-size:18px;
  }

  .network-stats strong{
    font-size:24px;
  }

  .link-section{
    grid-template-columns:1fr;
  }

  .small-link{
    min-height:64px;
    font-size:17px;
  }

  .petnet-box{
    padding:27px 18px 20px;
    border-radius:22px;
  }

  .dog-circle{
    width:80px;
    height:80px;
    font-size:47px;
  }

  .petnet-title{
    font-size:23px;
  }

  .petnet-desc{
    font-size:16px;
  }

  .petnet-btn{
    padding:17px 14px;
    font-size:19px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <div class="logo">
    잇넷 <span>(ITNET KOREA)</span>
  </div>

  <div class="sub">
    소중한 그것(It)을 다시 연결합니다.
  </div>

  <img
    src="itnet-hero.png"
    class="hero-img"
    alt="잇넷 무료 QR 연결 서비스"
  >

  <div class="main-title">
    소중한 물건부터<br>
    <span>보호가 필요한 가족까지</span>
  </div>

  <div class="desc">
    QR 스캔 한 번으로<br>
    소유자 또는 보호자에게 바로 연결됩니다.
  </div>

  <a href="register.html" class="qr-btn">
    무료 QR 생성하기
  </a>

  <div class="simple">
    <span>회원가입 ×</span>
    <span>·</span>
    <span>앱 설치 ×</span>
    <span>·</span>
    <span class="yes">무료 사용 ○</span>
  </div>

  <div class="network-stats">
    현재
    <strong id="itnetCount">0</strong>개의 잇넷 QR이<br>
    소중한 연결을 지키고 있어요.
  </div>

  <div class="link-section">

    <a href="lost-item-qr.html" class="small-link">
      📌 잇넷 QR 자세히 보기
    </a>

    <a href="reviews.html" class="small-link">
      ⭐ 잇넷 후기 게시판
    </a>

  </div>

  <div class="petnet-box">

    <div class="petnet-content">

      <div class="dog-circle">
        🐶
      </div>

      <div class="petnet-label">
        PETNET KOREA
      </div>

      <h3 class="petnet-title">
        반려견을 위한 안전 연결망
      </h3>

      <p class="petnet-desc">
        무료 반려견 QR로 발견자와 보호자를<br>
        빠르게 연결하세요.
      </p>

      <a
        href="https://mans31910000-sys.github.io/"
        class="petnet-btn"
      >
        펫넷 바로가기 →
      </a>

    </div>

  </div>

  <div class="footer">
    ITNET KOREA · 무료 QR 연결 서비스
  </div>

</div>

<script>
function showCount(data){
  const countElement = document.getElementById("itnetCount");

  if(!countElement){
    return;
  }

  const count = data && data.itnetTotalCount != null
  ? Number(data.itnetTotalCount)
  : data && data.itnetCount != null
    ? Number(data.itnetCount)
    : 0;

  countElement.innerText = count.toLocaleString();
}

const countScript = document.createElement("script");

countScript.src =
  "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec?count=1&callback=showCount";

countScript.onerror = function(){
  document.getElementById("itnetCount").innerText = "0";
};

document.body.appendChild(countScript);
</script>

</body>
</html>
