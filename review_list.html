<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>잇넷 후기 더보기 | ITNET KOREA</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f9ff;
  color:#0b2239;
  text-align:center;
}

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:36px 18px 60px;
}

h1{
  font-size:38px;
  margin:20px 0 12px;
  font-weight:900;
  color:#073b78;
}

.desc{
  font-size:19px;
  line-height:1.6;
  color:#4b5d6d;
  margin-bottom:28px;
}

.review-card{
  background:white;
  border:1px solid #e4eef2;
  border-radius:22px;
  padding:26px;
  margin:18px auto;
  text-align:left;
  box-shadow:0 8px 22px rgba(0,0,0,.06);
}

.review-title{
  font-size:24px;
  font-weight:900;
  margin-bottom:10px;
}

.review-text{
  font-size:18px;
  line-height:1.7;
  color:#405060;
}

.back{
  display:block;
  margin-top:28px;
  color:#073b78;
  font-size:20px;
  font-weight:900;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="wrap">

  <h1>⭐ 잇넷 후기 더보기</h1>

  <div class="desc">
    잇넷 QR를 통해 소중한 물건을 다시 찾은 후기와 사례를 확인할 수 있습니다.
  </div>

  <div class="review-card">
    <div class="review-title">지갑을 다시 찾았어요</div>
    <div class="review-text">
      잇넷 QR 덕분에 발견자가 바로 연락할 수 있어서 빠르게 지갑을 돌려받았습니다.
    </div>
  </div>

  <div class="review-card">
    <div class="review-title">자동차 키를 찾았습니다</div>
    <div class="review-text">
      키링에 붙여둔 QR을 보고 연락이 와서 큰 도움을 받았습니다.
    </div>
  </div>

  <div class="review-card">
    <div class="review-title">가방을 찾았습니다</div>
    <div class="review-text">
      가방 안쪽에 붙여둔 QR 덕분에 연락을 받고 분실물을 찾을 수 있었습니다.
    </div>
  </div>

  <a href="reviews.html" class="back">후기게시판으로 돌아가기</a>
  <a href="index.html" class="back">잇넷 메인으로 돌아가기</a>

</div>

</body>
</html>
