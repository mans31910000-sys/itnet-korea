<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>잇넷 후기 더보기 | ITNET KOREA</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial,sans-serif;background:#f5f9ff;color:#0b2239;text-align:center;}
.wrap{max-width:900px;margin:0 auto;padding:36px 18px 60px;}
h1{font-size:38px;margin:20px 0 12px;font-weight:900;color:#073b78;}
.desc{font-size:19px;line-height:1.6;color:#4b5d6d;margin-bottom:28px;}
.review-card{background:white;border:1px solid #e4eef2;border-radius:22px;padding:24px;margin:18px auto;text-align:left;box-shadow:0 8px 22px rgba(0,0,0,.06);}
.review-photo{width:100%;max-height:360px;object-fit:cover;border-radius:18px;margin-bottom:18px;}
.review-title{font-size:25px;font-weight:900;margin-bottom:10px;color:#0b2239;}
.review-meta{font-size:15px;color:#748494;margin-bottom:14px;font-weight:700;}
.review-text{font-size:18px;line-height:1.7;color:#405060;white-space:pre-line;}
.empty{background:white;border-radius:22px;padding:30px;font-size:18px;color:#4b5d6d;}
.back{display:block;margin-top:28px;color:#073b78;font-size:20px;font-weight:900;text-decoration:none;}
</style>
</head>

<body>
<div class="wrap">
  <h1>⭐ 잇넷 후기 더보기</h1>

  <div class="desc">
    잇넷 QR를 통해 소중한 물건을 다시 찾은 후기와 사례를 확인할 수 있습니다.
  </div>

  <div id="reviewList" class="empty">후기를 불러오는 중입니다.</div>

  <a href="reviews.html" class="back">후기게시판으로 돌아가기</a>
  <a href="index.html" class="back">잇넷 메인으로 돌아가기</a>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxS-o0PaeURCt_Uj9DnwcjtdBj-3zjFl5dxPWFTwMbQhAyMEnOtmYc9xK57chq5bq3yQ/exec";

function formatDate(value){
  const date = new Date(value);
  if(isNaN(date.getTime())) return value || "";

  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  const h = date.getHours();
  const min = String(date.getMinutes()).padStart(2, "0");
  const ampm = h < 12 ? "오전" : "오후";
  const hour12 = h % 12 || 12;

  return `${y}.${m}.${d} ${ampm} ${hour12}:${min}`;
}

function showReviews(data){
  const list = document.getElementById("reviewList");

  const reviews = data.filter(row =>
    row.reviewType === "잇넷" &&
    row.status === "승인"
  );

  if(reviews.length === 0){
    list.className = "empty";
    list.innerHTML = "아직 등록된 잇넷 후기가 없습니다.";
    return;
  }

  list.className = "";
  list.innerHTML = reviews.reverse().map(row => `
    <div class="review-card">
      ${row.photoUrl ? `<img src="${row.photoUrl}" class="review-photo" alt="후기 사진">` : ""}
      <div class="review-title">${row.title || "제목 없음"}</div>
      <div class="review-meta">${formatDate(row.date)} / ${row.writer || "익명"}</div>
      <div class="review-text">${row.content || ""}</div>
    </div>
  `).join("");
}

fetch(SCRIPT_URL + "?action=getReviews&callback=showReviews")
  .then(res => res.text())
  .then(text => eval(text))
  .catch(() => {
    document.getElementById("reviewList").innerHTML = "후기를 불러오지 못했습니다.";
  });
</script>

</body>
</html>
